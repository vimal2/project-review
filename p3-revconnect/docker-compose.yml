version: '3.8'

services:
  config-server:
    build: ./config-server
    container_name: revconnect-config-server
    ports:
      - "8888:8888"
    networks:
      - revconnect-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  discovery-server:
    build: ./discovery-server
    container_name: revconnect-discovery-server
    ports:
      - "8761:8761"
    networks:
      - revconnect-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: revconnect-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: revconnect-auth-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: revconnect-user-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  post-service:
    build: ./post-service
    container_name: revconnect-post-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  network-service:
    build: ./network-service
    container_name: revconnect-network-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  interaction-service:
    build: ./interaction-service
    container_name: revconnect-interaction-service
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: revconnect-notification-service
    ports:
      - "8086:8086"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revconnect-network
    depends_on:
      discovery-server:
        condition: service_healthy

networks:
  revconnect-network:
    driver: bridge
