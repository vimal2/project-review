server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Auth Service Routes
        - id: auth-service-auth
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /${segment}

        - id: auth-service-notifications
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - RewritePath=/api/notifications/(?<segment>.*), /notifications/${segment}

        # Jobseeker Service Routes
        - id: jobseeker-service-profile
          uri: lb://JOBSEEKER-SERVICE
          predicates:
            - Path=/api/jobseeker/**
          filters:
            - RewritePath=/api/jobseeker/(?<segment>.*), /${segment}

        - id: jobseeker-service-resume
          uri: lb://JOBSEEKER-SERVICE
          predicates:
            - Path=/api/resume/**
          filters:
            - RewritePath=/api/resume/(?<segment>.*), /resume/${segment}

        # Employer Service Routes
        - id: employer-service
          uri: lb://EMPLOYER-SERVICE
          predicates:
            - Path=/api/employer/**
          filters:
            - RewritePath=/api/employer/(?<segment>.*), /${segment}

        # Job Search Service Routes
        - id: job-search-service
          uri: lb://JOB-SEARCH-SERVICE
          predicates:
            - Path=/api/jobs/**
          filters:
            - RewritePath=/api/jobs/(?<segment>.*), /${segment}

        # Application Service Routes
        - id: application-service
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/api/applications/**
          filters:
            - RewritePath=/api/applications/(?<segment>.*), /${segment}

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:4200"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

# Management and Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# Logging Configuration
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.revhire.gateway: DEBUG
