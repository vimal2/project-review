server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: jobseeker-service
          uri: lb://jobseeker-service
          predicates:
            - Path=/api/jobseekers/**
          filters:
            - StripPrefix=1
        - id: employer-service
          uri: lb://employer-service
          predicates:
            - Path=/api/employers/**
          filters:
            - StripPrefix=1
        - id: job-search-service
          uri: lb://job-search-service
          predicates:
            - Path=/api/jobs/**
          filters:
            - StripPrefix=1
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/api/applications/**
          filters:
            - StripPrefix=1

jwt:
  secret: RevHireJwtSecretKeyForHS256MustBeAtLeast32CharsLong123
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
