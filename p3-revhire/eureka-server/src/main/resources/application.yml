spring:
  application:
    name: eureka-server

server:
  port: 8761

eureka:
  client:
    # Don't register this Eureka server with itself
    register-with-eureka: false
    # Don't fetch registry since this is the registry itself
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost
  server:
    # Disable self-preservation mode in development
    # (keeps removing unavailable services even if network issues occur)
    enable-self-preservation: false
    # How often to check for expired clients (in ms)
    eviction-interval-timer-in-ms: 3000

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
