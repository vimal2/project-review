<section class="ui-page">
  <div class="ui-card ui-auth-card">
    <h2 class="ui-title">Artist Registration</h2>
    <p class="ui-subtitle">Create your artist account details.</p>

    <form class="ui-form" [formGroup]="registerForm" (ngSubmit)="register()">
      <div class="ui-field">
        <label>Name:</label>
        <input type="text" formControlName="artistName" />
      </div>

      <div class="ui-field">
        <label>Email:</label>
        <input type="email" formControlName="email" />
      </div>

      <div class="ui-field">
        <label>Password:</label>
        <input type="password" formControlName="password" />
      </div>

      <div class="ui-field">
        <label>Genre:</label>
        <input type="text" formControlName="genre" />
      </div>

      <div class="ui-actions">
        <button type="submit">Register</button>
      </div>
    </form>
  </div>
</section>
