<h2>Browse Songs</h2>

<div *ngIf="songs.length === 0" class="card">
  <p>No songs available.</p>
</div>

<div *ngFor="let song of pagedSongs" class="card browse-row">
  <div
    class="song-main song-main-clickable"
    role="button"
    tabindex="0"
    (click)="playSong(song.id)"
    (keydown.enter)="playSong(song.id)"
    (keydown.space)="playSong(song.id)">
    <p class="song-title">{{ song.title }}</p>
  </div>
  <div class="song-actions">
    <button
      type="button"
      class="play-toggle"
      (click)="playSong(song.id)"
      aria-label="Play song">
      Play
    </button>
    <button
      type="button"
      class="view-toggle"
      (click)="viewSongDetails(song.id)"
      aria-label="View song details">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5C6 5 2.2 9.2 1 12c1.2 2.8 5 7 11 7s9.8-4.2 11-7c-1.2-2.8-5-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"></path>
      </svg>
    </button>
    <button
      type="button"
      class="favorite-toggle"
      [class.favorite-on]="song.isFavorite"
      [disabled]="processingSongIds.has(song.id)"
      (click)="toggleFavorite(song)"
      [attr.aria-label]="song.isFavorite ? 'Remove from favorites' : 'Add to favorites'">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5A4.5 4.5 0 0 1 6.5 4C8.24 4 9.91 4.81 11 6.08 12.09 4.81 13.76 4 15.5 4A4.5 4.5 0 0 1 20 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
      </svg>
    </button>
  </div>
</div>

<div class="pagination" *ngIf="songs.length > 0">
  <button type="button" (click)="previousPage()" [disabled]="currentPage === 1">Prev</button>
  <span>Page {{ currentPage }} / {{ totalPages }}</span>
  <button type="button" (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
</div>
