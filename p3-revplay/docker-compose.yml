version: '3.8'

services:
  config-server:
    build: ./config-server
    container_name: revplay-config-server
    ports:
      - "8888:8888"
    networks:
      - revplay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  discovery-server:
    build: ./discovery-server
    container_name: revplay-discovery-server
    ports:
      - "8761:8761"
    networks:
      - revplay-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: revplay-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    container_name: revplay-auth-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: revplay-user-service
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  artist-service:
    build: ./artist-service
    container_name: revplay-artist-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  music-service:
    build: ./music-service
    container_name: revplay-music-service
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  player-service:
    build: ./player-service
    container_name: revplay-player-service
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: revplay-analytics-service
    ports:
      - "8086:8086"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - revplay-network
    depends_on:
      discovery-server:
        condition: service_healthy

networks:
  revplay-network:
    driver: bridge
