# ============================================================
# RevConnect Application Configuration
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/api

# ============================================================
# MySQL Database
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/RevConnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Srinu@1106
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ============================================================
# JPA / Hibernate  — Tables auto-generated!
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=RevConnect_Super_Secret_Key_2024_MinimumSixtyFourCharactersLongForHS512AlgorithmSecurity!
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:4200

# ============================================================
# Log4J2
# ============================================================
logging.config=classpath:log4j2.xml
