<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Demo Login Page</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #f3f7ff; margin: 0; }
    .card { max-width: 360px; margin: 8vh auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    h1 { margin: 0 0 14px; font-size: 20px; color: #0b3a8f; }
    label { display: block; font-size: 13px; margin: 12px 0 6px; }
    input { width: 100%; padding: 10px; border: 1px solid #cad5ef; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 14px; width: 100%; background: #0d6efd; color: #fff; border: 0; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Local Demo Login</h1>
    <form>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
      <button type="button">Sign In</button>
    </form>
  </div>
</body>
</html>
