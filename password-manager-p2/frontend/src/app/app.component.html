<app-toast></app-toast>

<main class="shell">
  <aside class="sidebar">
    <h1>Password Manager</h1>
    <nav class="nav-links">
      <a *ngIf="authService.isAuthenticated()" routerLink="/master-password" routerLinkActive="active">Master Password</a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/vault" routerLinkActive="active">Vault</a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/generator" routerLinkActive="active">Generator</a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/audit" routerLinkActive="active">Security Audit</a>
      <a *ngIf="authService.isAuthenticated()" routerLink="/backup-operations" routerLinkActive="active">Backup Operations</a>

      <a *ngIf="!authService.isAuthenticated()" routerLink="/register" routerLinkActive="active">Register</a>
      <a *ngIf="!authService.isAuthenticated()" routerLink="/login" routerLinkActive="active">Login</a>
      <a *ngIf="!authService.isAuthenticated()" routerLink="/forgot-password" routerLinkActive="active">Forgot Password</a>

      <button type="button" *ngIf="authService.isAuthenticated()" (click)="logout()">Logout</button>
    </nav>
  </aside>

  <section class="content">
    <router-outlet></router-outlet>
  </section>
</main>
