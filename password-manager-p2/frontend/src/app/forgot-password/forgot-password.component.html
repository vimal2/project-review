<section class="card">
  <h2>Forgot Password</h2>

  <label>
    Email
    <input type="email" [(ngModel)]="form.email" name="email" required />
  </label>
  <button type="button" (click)="requestCode()">Request Verification Code</button>

  <label>
    Verification Code
    <input [(ngModel)]="form.verificationCode" name="verificationCode" required />
  </label>
  <label>
    New Password
    <input type="password" [(ngModel)]="form.newPassword" name="newPassword" required minlength="6" />
  </label>
  <label>
    Confirm Password
    <input type="password" [(ngModel)]="form.confirmPassword" name="confirmPassword" required minlength="6" />
  </label>

  <button type="button" (click)="resetPassword()">Reset Password</button>
  <p class="ok" *ngIf="message">{{ message }}</p>
  <p class="err" *ngIf="error">{{ error }}</p>
</section>
