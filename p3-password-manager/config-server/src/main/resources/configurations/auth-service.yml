# Auth Service Configuration (Namratha)
server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

jwt:
  secret: PasswordManagerSecretKeyForJwtTokenGeneration12345678901234567890
  expiration: 86400000

app:
  cors:
    allowed-origins: http://localhost:4200,chrome-extension://*
