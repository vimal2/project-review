# Backup Service Configuration (Akhila)
server:
  port: 8084

spring:
  datasource:
    url: jdbc:h2:mem:backupdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

backup:
  encryption-key: BackupEncryptionSecretKey12345678
  storage-path: ./backups/

resilience4j:
  circuitbreaker:
    instances:
      vaultService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      authService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  retry:
    instances:
      vaultService:
        max-attempts: 3
        wait-duration: 1s
