# Default configuration for all services
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    root: INFO
    com.passwordmanager: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
